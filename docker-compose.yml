version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-einv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-einv_pass}
      POSTGRES_DB: ${POSTGRES_DB:-einvoice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-einv} -d ${POSTGRES_DB:-einvoice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Mirrors MINIO_ACCESS_KEY / MINIO_SECRET_KEY from .env
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"   # MinIO console (dev/staging only — close on prod)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────
  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 3

  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 3

  ocr-worker:
    build:
      context: .
      dockerfile: services/ocr-worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    # Single process, solo pool — asyncio handles concurrency via run_in_executor
    command: celery -A celery_app worker --loglevel=info --pool=solo --concurrency=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - model_registry:/app/model_registry

  celery-beat:
    build:
      context: .
      dockerfile: services/ocr-worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      core-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
  model_registry:
